<?xml version="1.0" encoding="UTF-8"?>
<!-- Favicon: the Piráti a Zelení pro Lískovec mark — a black pirate flag on its
     pole, inside a split ring (black left, magenta right), over two green leaves. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Piráti a Zelení pro Lískovec">
  <rect width="64" height="64" rx="14" fill="#ffffff"/>
  <!-- ring: left arc black (Piráti), right arc magenta -->
  <path d="M32 9 A21 21 0 0 0 32 51" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <path d="M32 9 A21 21 0 0 1 32 51" fill="none" stroke="#e00c63" stroke-width="5" stroke-linecap="round"/>
  <!-- pirate flag on its pole (the "P") -->
  <rect x="25" y="16" width="3.4" height="29" rx="1.7" fill="#1a1a1a"/>
  <path d="M28 17 C40 17.5 43 23 47 24 C43 25.5 40 31 28 31.5 Z" fill="#1a1a1a"/>
  <!-- two green leaves sprouting from a common base (echoes the logo) -->
  <path d="M32 55 Q19 52 17 41 Q28 45 32 55 Z" fill="#109a3c"/>
  <path d="M32 55 Q45 52 47 41 Q36 45 32 55 Z" fill="#109a3c"/>
</svg>
